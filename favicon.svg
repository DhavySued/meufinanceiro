<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7e22ce"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="64" height="64" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <!-- Fundo com gradiente -->
  <rect width="64" height="64" rx="16" ry="16" fill="url(#bg)"/>

  <!-- Reflexo glassmorphism -->
  <rect width="64" height="64" rx="16" ry="16" fill="url(#shine)"/>

  <!-- Barra de gráfico de crescimento -->
  <rect x="10" y="38" width="9" height="14" rx="2.5" fill="white" opacity="0.55"/>
  <rect x="22" y="30" width="9" height="22" rx="2.5" fill="white" opacity="0.70"/>
  <rect x="34" y="20" width="9" height="32" rx="2.5" fill="white" opacity="0.85"/>

  <!-- Seta de tendência de alta -->
  <polyline points="10,36 27,22 44,12" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <polygon points="44,12 37,13 43,18" fill="white" opacity="0.9"/>

  <!-- Cifrão pequeno no canto inferior direito -->
  <circle cx="51" cy="49" r="10" fill="white" opacity="0.18"/>
  <text x="51" y="53.5" text-anchor="middle" font-family="'Outfit', Arial, sans-serif" font-size="13" font-weight="700" fill="white" opacity="0.95">$</text>
</svg>
